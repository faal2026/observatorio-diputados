name: Importar transparencia oficial

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/imports/official/**"
      - "collector/import_official_transparency.py"
      - ".github/workflows/importar-transparencia-oficial.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: importar-transparencia-oficial
  cancel-in-progress: false

jobs:
  import-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener el proyecto
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Incorporar exportaciones oficiales
        run: python collector/import_official_transparency.py

      - name: Guardar datos preparados
        id: save
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/generated/chile-details-summary.json public/data/chile
          if git diff --cached --quiet; then
            echo "No hay exportaciones nuevas para incorporar."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Incorporar transparencia oficial exportada"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publicar la versión con datos incorporados
        if: steps.save.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches" \
            --data '{"ref":"main"}'
