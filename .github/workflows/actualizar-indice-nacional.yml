name: Actualizar índice nacional

on:
  workflow_dispatch:
  schedule:
    - cron: "15 12 * * 1"

permissions:
  contents: write

jobs:
  collect-national-index:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener el proyecto
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar nómina oficial de Chile
        run: python collector/collect_national_index.py

      - name: Verificar nómina nacional
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("data/generated/chile-summary.json").read_text(encoding="utf-8"))
          if summary.get("availability") != "national_index_complete" or summary.get("deputies_count") != 155:
              raise SystemExit("La nómina nacional no quedó completa; se cancela la publicación.")
          print("Nómina verificada: 155 diputadas y diputados.")
          PY

      - name: Guardar índice actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # data/generated está excluido del repositorio por defecto. Se fuerza
          # sólo este archivo verificable para que Pages reconstruya el mapa.
          git add -f data/generated/chile-summary.json public/data/chile
          if git diff --cached --quiet; then
            echo "La nómina nacional no registra cambios."
          else
            git commit -m "Actualizar índice nacional de diputados"
            git push
          fi
